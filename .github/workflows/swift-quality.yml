name: Swift Quality

on:
  workflow_dispatch:
  workflow_call:

jobs:
  quality:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4 # v1
        with:
          xcode-version: "16.4"

      - name: Verify toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Lint Package Manifest
        run: swift format lint --configuration .swift-format --strict Package.swift

      - name: Lint Sources and Tests
        run: swift format lint --configuration .swift-format --strict --recursive Sources Tests
